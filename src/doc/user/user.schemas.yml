components:
  schemas:
    CreateUserRequestDtos:
      type: object
      required: [email, name, password, rol]
      properties:
        email:
          type: string
          format: email
          example: user-example@example.com
        name:
          type: string
          example: example user
        password:
          type: string
          format: password
          example: User123!
        rol:
          type: array
          items:
            type: number
          example: [1, 2]
    UpdatePasswordRequestDtos:
      type: object
      required: [password, oldPassword]
      properties:
        currentPassword:
          type: string
          format: password
          example: admin123
        newPassword:
          type: string
          format: password
          example: User123!
    UpdateProfileRequestDtos:
      type: object
      properties:
        name:
          type: string
          example: example user update
    UpdateImageRequestDtos:
      type: object
      properties:
        image:
          type: string
          example: https://res.cloudinary.com/dbe4rxkkn/image/upload/v1781889815/rbac/users/1/avatar.jpg
    UpdateUserRequestDtos:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user-updated@example.com
        name:
          type: string
          example: update user
        password:
          type: string
          format: password
          example: User123!
        rol:
          type: array
          items:
            type: number
          example: [2]
    UserByIdResponseDtos:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: example user
        email:
          type: string
          format: email
          example: user@example.com
        rol:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
                example: 1
              name:
                type: string
                example: example rol
    UserResponseDtos:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: example rol
        email:
          type: string
          format: email
          example: user@example.com
    UserResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: number
          example: 200
        message:
          type: string
          example: ok
        data:
          type: object
          properties:
            total:
              type: number
              example: 100
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserResponseDtos'
    UserByIdResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: number
          example: 200
        message:
          type: string          
          example: ok
        data:
            $ref: '#/components/schemas/UserByIdResponseDtos'


