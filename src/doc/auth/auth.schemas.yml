components:
  schemas:
    LoginRequestDtos:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          example: admin123
    RegisterRequestDtos:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: User123!
        name:
          type: string
          example: John Doe
    AuthUserResponseDtos:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: user@example.com
    AuthResponseDtos:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
        user:
            $ref: '#/components/schemas/AuthUserResponseDtos'
    AuthResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: integer
          example: 201
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/AuthResponseDtos'