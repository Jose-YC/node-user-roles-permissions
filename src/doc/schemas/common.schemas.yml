components:
  securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
        description: Ingresa el token JWT obtenido en /auth/login o /auth/register
  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: integer
          example: 200
        message:
          type: string
          example: ok
    ErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Error message