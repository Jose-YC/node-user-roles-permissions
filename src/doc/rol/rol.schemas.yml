components:
  schemas:
    CreateRolRequestDtos:
      type: object
      required: [name, description, permissions_id]
      properties:
        name:
          type: string
          example: example rol
        description:
          type: string
          example: example description
        permissions_id:
          type: array
          items:
            type: number
          example: [1, 2, 3]
    UpdateRolRequestDtos:
      type: object
      properties:
        name:
          type: string
          example: example update
        description:
          type: string
          example: example description update
        permissions_id:
          type: array
          items:
            type: number
          example: [1, 2, 3]
    RolByIdResponseDtos:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: example rol
        description:
          type: string
          example: example description
        permissions:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
                example: 1
              name:
                type: string
                example: example:read
              module:
                type: string
                example: example
    RolResponseDtos:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: example rol
        description:
          type: string
          example: example description
        permissions:
          type: number
          example: 3
    RolResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: number
          example: 200
        message:
          type: string
          example: ok
        data:
          type: object
          properties:
            total:
              type: number
              example: 100
            items:
              type: array
              items:
                $ref: '#/components/schemas/RolResponseDtos'
    RolByIdResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        code:
          type: number
          example: 200
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/RolByIdResponseDtos'


