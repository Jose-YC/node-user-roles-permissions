/user/:
  security:
    - bearerAuth: []
  get:
    summary: Get all users
    tags: [User]
    description: Retrieve a list of all users.
    parameters:
      - in: query
        name: page
        required: true
        schema:
          type: number
          minimum: 1
        description: Page number for pagination
      - in: query
        name: lim
        required: true
        schema:
          type: number
          minimum: 1
        description: Number of items per page for pagination
      - in: query
        name: search
        required: false
        schema:
          type: string
        description: Search term to filter permissions by name or description
    responses:
      '200':
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UserResponse'
      '400':
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/user/{id}:
  security:
    - bearerAuth: []
  get:
    summary: Get a user by ID
    tags: [User]
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: number
          minimum: 1
        description: The ID of the user to retrieve
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserByIdResponse'
      '400':
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/user/create:
  security:
    - bearerAuth: []
  post:
    summary: Create a new user
    tags: [User]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateUserRequestDtos'
    responses:
      '201':
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuccessResponse'
      '400':
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/user/update/{id}:
